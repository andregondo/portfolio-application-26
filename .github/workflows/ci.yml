name: My first pipeline

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/portfolio-application-26:${{ github.run_number }} \
            -t ${{ secrets.DOCKER_USERNAME }}/portfolio-application-26 .

      - name: Push Image to Registry
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/portfolio-application-26:${{ github.run_number }}
          docker push ${{ secrets.DOCKER_USERNAME }}/portfolio-application-26:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: SSH and run container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.HOST_USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            docker rm -f portfolio || echo "container not found skip removal"
            docker run -d --name portfolio -p 8080:80 ${{ secrets.DOCKER_USERNAME }}/portfolio-application-26:${{ github.run_number }}